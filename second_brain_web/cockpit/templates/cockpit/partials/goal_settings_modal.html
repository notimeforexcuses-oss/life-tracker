<div class="fixed inset-0 bg-gray-900 bg-opacity-50 z-50 flex items-center justify-center p-4" id="goal-settings-modal" role="dialog" aria-modal="true">
    <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden flex flex-col">
        
        <div class="p-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
            <h2 class="text-lg font-bold text-gray-800" id="goal-settings-header" tabindex="-1">Goal Settings</h2>
            <button onclick="handleModalClose('goal-settings-modal', 'goal-overview-heading')" class="text-gray-400 hover:text-gray-800 text-2xl" aria-label="Close">&times;</button>
        </div>

        <form hx-post="/api/goals/{{ goal.id }}/update" hx-swap="none">
            <div class="p-6 space-y-5">
                
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Goal Title</label>
                    <input type="text" name="title" value="{{ goal.title }}" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500 font-bold text-lg">
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Motivation</label>
                    <textarea name="motivation" rows="2" class="w-full p-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500">{{ goal.motivation }}</textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Status</label>
                        <select name="status" class="w-full p-2 border border-gray-300 rounded bg-white">
                            <option value="ACTIVE" {% if goal.status == 'ACTIVE' %}selected{% endif %}>Active</option>
                            <option value="COMPLETED" {% if goal.status == 'COMPLETED' %}selected{% endif %}>Completed</option>
                            <option value="PAUSED" {% if goal.status == 'PAUSED' %}selected{% endif %}>Paused</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 uppercase tracking-widest mb-1">Target Date</label>
                        <input type="date" name="target_date" value="{{ goal.target_date }}" class="w-full p-2 border border-gray-300 rounded bg-white">
                    </div>
                </div>

            </div>

            <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end space-x-2">
                <button type="button" onclick="handleModalClose('goal-settings-modal', 'goal-overview-heading')" class="px-3 py-1.5 text-gray-500 font-medium hover:bg-gray-200 rounded">Cancel</button>
                <button type="submit" onclick="persistToast('Goal settings saved')" class="px-4 py-1.5 bg-blue-600 text-white font-bold rounded hover:bg-blue-700 shadow-sm">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    setTimeout(() => {
        document.getElementById('goal-settings-header').focus();
    }, 150);
</script>
