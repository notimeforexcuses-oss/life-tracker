<div id="assignee-list-{{ entity_type }}-{{ entity_id }}" class="space-y-2">
    <div class="flex items-center justify-between">
        <label class="block text-xs font-bold text-gray-500 uppercase">Assigned People</label>
        
        <!-- Add Button / Dropdown -->
        <div class="relative" x-data="{ open: false }">
            <button @click="open = !open" 
                    class="text-blue-600 hover:text-blue-800 text-xs font-bold focus:outline-none">
                + Add
            </button>
            
            <div x-show="open" @click.outside="open = false" 
                 class="absolute top-full right-0 mt-1 w-48 bg-white border border-gray-200 rounded-lg shadow-lg z-50 p-2"
                 style="display: none;">
                <form hx-post="/api/assign/{{ entity_type }}/{{ entity_id }}/" 
                      hx-target="#assignee-list-{{ entity_type }}-{{ entity_id }}" 
                      hx-swap="outerHTML">
                    <select name="contact_id" class="w-full text-xs p-1 border rounded mb-2 bg-white" required>
                        <option value="">Select Person...</option>
                        {% for c in all_contacts %}
                        <option value="{{ c.id }}">{{ c.name }}</option>
                        {% endfor %}
                    </select>
                    <input type="text" name="role" placeholder="Role (e.g. Owner)" class="w-full text-xs p-1 border rounded mb-2">
                    <button type="submit" class="w-full bg-blue-600 text-white text-xs py-1 rounded font-bold hover:bg-blue-700">Assign</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="flex flex-wrap gap-2">
        {% for assignee in assignees %}
        <div class="inline-flex items-center px-2 py-1 rounded bg-blue-50 border border-blue-200 text-xs font-bold text-blue-800">
            <span title="{{ assignee.role }}">{{ assignee.contact.name }}</span>
            <button hx-delete="/api/assign/{{ entity_type }}/{{ entity_id }}/remove/{{ assignee.contact.id }}/"
                    hx-target="#assignee-list-{{ entity_type }}-{{ entity_id }}"
                    hx-swap="outerHTML"
                    class="ml-2 text-blue-400 hover:text-blue-600 focus:outline-none"
                    aria-label="Remove {{ assignee.contact.name }}">
                &times;
            </button>
        </div>
        {% empty %}
        <p class="text-xs text-gray-400 italic">No one assigned.</p>
        {% endfor %}
    </div>
</div>
