<div class="bg-white border border-gray-200 rounded-lg p-4 hover:shadow-lg hover:border-blue-400 hover:-translate-y-0.5 transition-all duration-200 group relative">
    
    <div class="flex justify-between items-start">
        
        <button hx-get="/api/tasks/{{ task.id }}/detail/?return_focus={{ return_focus|default:'main-heading' }}" 
                hx-target="#modal-container"
                hx-swap="innerHTML"
                onclick="playSystemSound('success')"
                class="text-left flex-1 focus:outline-none focus:text-blue-700 focus:underline group-hover:text-blue-700"
                aria-label="{{ task.title }}, {{ task.priority }} Priority, Due {{ task.parsed_due_date|date:'m-d-Y'|default:'Someday' }}">
            
            <span class="block text-sm font-semibold text-gray-900 group-hover:text-blue-700 transition-colors">
                {{ task.title }}
            </span>
            
            <span class="flex items-center space-x-2 text-xs text-gray-500 mt-1.5 font-medium">
                {% if task.parsed_due_date %}
                    {% if task.is_overdue %}
                        <span class="text-red-600 bg-red-50 px-2 py-0.5 rounded-md">📅 {{ task.parsed_due_date|date:"m-d-Y" }} (Overdue)</span>
                    {% else %}
                        <span class="text-gray-500 bg-gray-100 px-2 py-0.5 rounded-md">📅 {{ task.parsed_due_date|date:"m-d-Y" }}</span>
                    {% endif %}
                {% endif %}
                
                {% if task.priority == 'High' %}
                    <span class="bg-red-100 text-red-800 text-xs font-bold px-2 py-0.5 rounded-full border border-red-200">
                        High Priority
                    </span>
                {% endif %}
            </span>
        </button>

        <div class="text-gray-300 pl-2 group-hover:text-blue-400 transition-colors" aria-hidden="true">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </div>
    </div>

    <div class="mt-3 pl-0 border-t border-gray-100 pt-3 flex justify-start">
        <button hx-post="/api/tasks/{{ task.id }}/complete/?context={{ view_context|default:'global' }}&target={{ target_container }}" 
                hx-target="{{ target_container|default:'#task-list-container' }}" 
                hx-swap="innerHTML"
                onclick="playSystemSound('success')"
                class="flex items-center text-xs font-bold transition-colors px-1 py-0.5 rounded focus:outline-none focus:underline
                       {% if task.status == 'COMPLETED' %} text-gray-500 hover:text-blue-600 focus:text-blue-600 {% else %} text-gray-500 hover:text-green-600 focus:text-green-600 {% endif %}"
                aria-label="{% if task.status == 'COMPLETED' %}Reopen Task{% else %}Mark Complete{% endif %}">
            
            {% if task.status == 'COMPLETED' %}
                <span class="w-4 h-4 rounded-full border-2 border-gray-300 mr-2 flex items-center justify-center text-transparent hover:border-blue-500 hover:bg-blue-50 transition-all" aria-hidden="true">
                    <svg class="w-3 h-3 fill-current opacity-0 hover:opacity-100 text-blue-600" viewBox="0 0 20 20"><path d="M10 2a1 1 0 00-1 1v1a1 1 0 002 0V3a1 1 0 00-1-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100 2h1a1 1 0 100-2h-1zM2 11a1 1 0 100 2h1a1 1 0 100-2H2z"/></svg>
                </span>
                Reopen Task
            {% else %}
                <span class="w-4 h-4 rounded-full border-2 border-gray-300 mr-2 flex items-center justify-center text-transparent hover:border-green-500 hover:bg-green-50 transition-all" aria-hidden="true">
                    <svg class="w-3 h-3 fill-current opacity-0 hover:opacity-100 text-green-600" viewBox="0 0 20 20"><path d="M0 11l2-2 5 5L18 3l2 2L7 18z"/></svg>
                </span>
                Mark Complete
            {% endif %}
        </button>
    </div>

</div>
