<div class="overflow-x-auto rounded-lg border border-gray-200 shadow-sm mb-4 bg-white">
    <table class="min-w-full divide-y divide-gray-200 text-sm">
        <thead class="bg-gray-50">
            <tr>
                {% for header in headers %}
                <th class="px-4 py-2 text-left font-bold text-gray-700 uppercase tracking-wider text-[10px]">
                    {{ header }}
                </th>
                {% endfor %}
            </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
            {% for row in rows %}
            <tr class="hover:bg-gray-50 transition-colors">
                {% for cell in row %}
                <td class="px-4 py-2 text-gray-600">
                    {{ cell }}
                </td>
                {% endfor %}
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
