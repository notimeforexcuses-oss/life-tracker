<div class="p-4 bg-white rounded-lg border-l-4 border-blue-500 shadow-sm mb-4 animate-fade-in" role="region" aria-label="{{ title }}">
    <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">{{ title }}</h3>
    <div class="mt-2 flex items-baseline justify-between">
        <div class="text-2xl font-bold text-gray-900">{{ value }}</div>
        {% if trend %}
        <span class="text-xs font-medium {% if trend_up %}text-green-600{% else %}text-red-600{% endif %}">
            {{ trend }}
        </span>
        {% endif %}
    </div>
    {% if description %}
    <p class="text-sm text-gray-600 mt-1 italic">{{ description }}</p>
    {% endif %}
</div>
